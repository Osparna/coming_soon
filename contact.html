<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ContactPage",
  "url": "https://osparna.com/contact.html",
  "name": "Contact — Osparna",
  "description": "Get in touch with Osparna — decision intelligence for investors.",
  "mainEntity": {
    "@type": "Organization",
    "name": "Osparna",
    "url": "https://osparna.com/",
    "email": "info@osparna.com"
  }

<style>
  :root{--blue1:#4169ff;--blue2:#2d9cec;--accent:#5aa9f2;--ink:#eef3f8;--muted:#9bb0c4;--faint:#6f8499;--hair:rgba(255,255,255,.10)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:#15212d;background:radial-gradient(120% 90% at 50% 0%,#243648 0%,#1b2935 52%,#131e29 100%);color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1100px;margin:0 auto;width:100%;padding:0 clamp(20px,5vw,48px)}
  .nav{position:sticky;top:0;z-index:20;background:rgba(19,30,41,.82);backdrop-filter:blur(9px);border-bottom:1px solid var(--hair)}
  .nav .row{display:flex;align-items:center;justify-content:space-between;height:64px}
  .brand{display:flex;align-items:center;gap:10px}
  .brand img{height:30px;width:auto}
  .brand .wm{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:21px;color:#fff}
  .links{display:flex;align-items:center;gap:26px}
  .links a{font-size:14.5px;color:var(--muted);font-weight:500}
  .links a:hover{color:#fff}
  .links .pill{background:linear-gradient(135deg,var(--blue1),var(--blue2));color:#fff;padding:9px 18px;border-radius:999px}
  @media(max-width:680px){.links{gap:14px}.links .ln{display:none}}
  main{flex:1}
  .wrap.form{max-width:620px;padding-top:clamp(56px,9vw,96px);padding-bottom:clamp(56px,9vw,96px)}
  .eyebrow{font-family:'Space Mono',monospace;font-size:13px;letter-spacing:.15em;text-transform:uppercase;color:var(--accent)}
  h1{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:clamp(2rem,5vw,3rem);line-height:1.06;letter-spacing:-.025em;margin-top:14px}
  .sub{margin-top:16px;color:var(--muted);font-size:1.08rem;line-height:1.6;max-width:48ch}
  form{margin-top:34px;display:flex;flex-direction:column;gap:18px}
  label{display:block;font-size:14px;color:#c7d6e6;margin-bottom:7px}
  label .req{color:var(--accent)}
  .field{width:100%;padding:13px 16px;border:1px solid rgba(255,255,255,.18);border-radius:12px;background:rgba(255,255,255,.05);color:var(--ink);font-size:15px;font-family:inherit}
  .field::placeholder{color:#7e93a8}
  .field:focus{outline:none;border-color:var(--blue1)}
  textarea.field{min-height:140px;resize:vertical}
  button{align-self:flex-start;border:none;border-radius:999px;padding:13px 26px;font-size:15px;font-weight:500;color:#fff;cursor:pointer;font-family:inherit;background:linear-gradient(135deg,var(--blue1),var(--blue2))}
  button:disabled{opacity:.6;cursor:default}
  .msg{font-size:14px;color:var(--muted);min-height:1.1em}
  .msg[hidden]{display:none}
  footer{border-top:1px solid var(--hair)}
  footer .row{display:flex;flex-wrap:wrap;gap:14px;justify-content:space-between;padding:26px 0}
  .tag{font-family:'Space Mono',monospace;font-size:13px;color:var(--faint)}
</style>
</head>
<body>
  <header class="nav">
    <div class="wrap row">
      <a class="brand" href="index.html" aria-label="Osparna home"><img src="/logo.png" alt="" onerror="this.style.display='none'"><span class="wm">osparna</span></a>
      <nav class="links" aria-label="Primary">
        <a class="ln" href="index.html#what-we-do">What We Do</a>
        <a class="ln" href="about.html">Who We Are</a>
        <a class="ln" href="blog.html">Blog</a>
        <a class="pill" href="contact.html">Contact Us</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="wrap form">
      <p class="eyebrow">Contact Us</p>
      <h1>Let's talk.</h1>
      <p class="sub">Tell us a bit about what you're working on and we'll be in touch.</p>

      <form id="contact">
        <input type="hidden" name="site" value="osparna">
        <div>
          <label for="email">Email <span class="req">*</span></label>
          <input class="field" id="email" name="email" type="email" required placeholder="you@firm.com">
        </div>
        <div>
          <label for="phone">Phone <span style="color:var(--faint)">(optional)</span></label>
          <input class="field" id="phone" name="phone" type="tel" placeholder="+1 (555) 555-5555">
        </div>
        <div>
          <label for="message">How can we help</label>
          <textarea class="field" id="message" name="message" placeholder="A sentence or two about your situation."></textarea>
        </div>
        <button type="submit">Send message</button>
        <p id="contact-msg" class="msg" hidden></p>
      </form>
    </div>
  </main>

  <footer><div class="wrap row">
    <span class="tag">decision intelligence for investors</span>
    <span class="tag">info@osparna.com</span>
  </div></footer>

  <script>
    const f = document.getElementById('contact'), m = document.getElementById('contact-msg');
    f.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = f.querySelector('button'); btn.disabled = true;
      try {
        const r = await fetch('/api/contact', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            site: f.site.value, email: f.email.value.trim(),
            phone: f.phone.value.trim(), message: f.message.value.trim()
          })
        });
        m.textContent = r.ok ? "Thanks — we'll be in touch soon." : "Something went wrong. Please try again.";
        if (r.ok) f.reset();
      } catch { m.textContent = "Something went wrong. Please try again."; }
      m.hidden = false; btn.disabled = false;
    });
  </script>
</body>
</html>
